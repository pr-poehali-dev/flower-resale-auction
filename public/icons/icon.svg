<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff3d8b"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ff6b2b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Цветок -->
  <g transform="translate(256,256)">
    <!-- Лепестки -->
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.95" transform="rotate(0)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.85" transform="rotate(60)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.85" transform="rotate(120)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.85" transform="rotate(180)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.85" transform="rotate(240)"/>
    <ellipse cx="0" cy="-80" rx="28" ry="55" fill="white" opacity="0.85" transform="rotate(300)"/>
    <!-- Центр -->
    <circle cx="0" cy="0" r="36" fill="white"/>
    <circle cx="0" cy="0" r="22" fill="url(#bg)"/>
    <!-- Стебель -->
    <rect x="-8" y="30" width="16" height="80" rx="8" fill="white" opacity="0.9"/>
    <ellipse cx="-28" cy="88" rx="22" ry="14" fill="white" opacity="0.7" transform="rotate(-30,-28,88)"/>
